services:
  track:
    build:
      context: ./services/track
      target: production
    command: bash -c "bin/rails db:prepare && bin/thrust bin/rails server"
    volumes: []  # No bind mounts in production - assets are baked into the image
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"

  firehose:
    environment:
      FIREHOSE_SAMPLE_RATE: "1.0" # Process 100% of events in Production

  opensearch:
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
